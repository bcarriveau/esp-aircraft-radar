[platformio]
; Keep generated objects and downloaded libraries out of Google Drive.
; Drive File Stream can lock or remove .pio files while SCons is building.
workspace_dir = ~/.platformio/workspaces/bills_aircraft_radar

[env:waveshare-s3-touch-lcd-7]
; ESP32_Display_Panel v0.1.4 requires Arduino-ESP32 3.x. The official
; PlatformIO espressif32 releases still bundle Arduino-ESP32 2.0.17.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.07/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Espressif's Arduino 3.0.7 high-performance SDK enables XIP-on-PSRAM,
; 64-byte S3 cache lines, and -O2. This is the required half of the official
; "RGB bounce buffer + XIP on PSRAM" screen-drift fix.
platform_packages =
  platformio/framework-arduinoespressif32-libs@https://dl.espressif.com/AE/esp-arduino-libs/esp32-3.0.7-h.zip

board_build.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_build.partitions = default_16MB.csv

build_flags =
  -DBOARD_HAS_PSRAM
  -DLV_CONF_INCLUDE_SIMPLE
  -DESP_PANEL_CUSTOM_BOARD_PATH=waveshare_panel_board.h
  -I include

lib_deps =
  https://github.com/iamfaraz/Waveshare_ST7262_LVGL.git#v0.1
  https://github.com/esp-arduino-libs/ESP32_Display_Panel.git#v0.1.4
  https://github.com/esp-arduino-libs/ESP32_IO_Expander.git#v0.0.3
  lvgl/lvgl@8.3.11
  bblanchon/ArduinoJson@7.3.1
